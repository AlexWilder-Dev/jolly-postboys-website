<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | The Jolly Postboys</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #3d5f6e;
            --bg-dark:     #2d4f5e;
            --bg-darker:   #1e3a47;
            --gold:        #c8a030;
            --cream-light: #f4ecd8;
            --cream-mid:   #d8c494;
            --cream-dim:   #a89464;
            --dark:        #1a2e38;
            --font-display: 'Anton', Impact, sans-serif;
            --font-mono:    'Space Mono', 'Courier New', monospace;
        }

        body {
            background: var(--bg-darker);
            color: var(--cream-light);
            font-family: var(--font-mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
        }

        .four-oh-four {
            font-family: var(--font-display);
            font-size: clamp(6rem, 25vw, 12rem);
            line-height: 1;
            color: var(--gold);
            opacity: 0.25;
            letter-spacing: 0.05em;
            user-select: none;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            color: var(--cream-light);
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            letter-spacing: 0.03em;
        }

        p {
            color: var(--cream-mid);
            font-size: 0.9rem;
            line-height: 1.8;
            max-width: 420px;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 0.06em;
            padding: 0.75rem 2.5rem;
            border-radius: 3px;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .btn:hover {
            background: var(--cream-light);
            transform: translateY(-2px);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 1.5rem auto;
            opacity: 0.4;
        }

        .contact-hint {
            margin-top: 2rem;
            font-size: 0.78rem;
            color: var(--cream-dim);
        }

        .contact-hint a {
            color: var(--gold);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="four-oh-four" aria-hidden="true">404</div>
    <h1>Page Not Found</h1>
    <div class="divider"></div>
    <p>That round seems to have gone missing. The page you're looking for doesn't exist or may have moved.</p>
    <a href="/" class="btn">Back to the Bar</a>
    <p class="contact-hint">
        Looking for something specific?<br>
        Call us on <a href="tel:01865777767">01865 777767</a> or
        <a href="mailto:hello@jollypostboys.co.uk">drop us a line</a>.
    </p>
</body>
</html>
